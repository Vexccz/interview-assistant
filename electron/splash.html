<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>InterviewAI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #18181b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: white;
      overflow: hidden;
      -webkit-app-region: drag;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #3b82f6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 16px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 13px;
      color: #a1a1aa;
      margin-bottom: 24px;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #3f3f46;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
  </style>
</head>
<body>
  <div class="icon">AI</div>
  <div class="title">InterviewAI</div>
  <div class="subtitle">Preparing your assistant...</div>
  <div class="spinner"></div>
</body>
</html>
